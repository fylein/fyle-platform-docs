post:
  tags:
    - Levels
  security:
    - oauth2: ['*']
  summary: Delete levels
  description: |
    Deletes unused levels. If any supplied level is assigned to an employee or used in an
    expense policy, the request fails without deleting any levels. A maximum of 200 unique
    level IDs can be processed. Repeated IDs are deduplicated in first-seen order before the
    limit is enforced.
  operationId: levels_delete_bulk_post
  requestBody:
    required: True
    content:
      application/json:
        schema:
          type: object
          additionalProperties: False
          required:
            - data
          properties:
            data:
              type: array
              items:
                $ref: '../../components/schemas/level.yaml#/level_in_only_id'
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            type: object
            additionalProperties: False
    '400':
      description: Bad request
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
              data:
                type: object
                nullable: true
                example: null
              error:
                type: string
                example: InvalidUsage
          examples:
            limit_exceeded:
              summary: More than 200 unique level IDs supplied
              value:
                message: Cannot perform action for more than 200 levels at once.
                data: null
                error: InvalidUsage
            dependency_blocked:
              summary: A level is assigned or used by another resource
              value:
                message: Can not delete level(s) used in other resources like employee assignments, expense policy.
                data: null
                error: InvalidUsage
    '401':
      description: Unauthorised request
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/401.yaml'
    '403':
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/403.yaml'

post:
  tags:
    - Expenses
  summary: Reorder custom expense fields
  description: |
    Reorders all enabled, non-dependent custom expense fields for the organization.
    Every eligible expense field must be included exactly once. The order of the
    request items determines the `display_order`, starting from 1.
  operationId: expense_fields_reorder
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          additionalProperties: false
          required:
            - data
          properties:
            data:
              type: array
              minItems: 1
              uniqueItems: true
              items:
                $ref: '../../components/schemas/expense_field.yaml#/expense_field_reorder_in'
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            type: object
            additionalProperties: false
            required:
              - data
            properties:
              data:
                type: array
                items:
                  $ref: '../../components/schemas/expense_field.yaml#/expense_field_out'
    '400':
      description: Bad request
      content:
        application/json:
          schema:
            oneOf:
              - $ref: ../../components/schemas/bulk_error.yaml
              - $ref: ../../components/schemas/400.yaml
    '401':
      description: Unauthorized request
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/401.yaml
    '403':
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/403.yaml

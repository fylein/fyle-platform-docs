post:
  tags:
    - Per Diem Rates
  summary: Create delete summary for per diem rates
  description: |
    Delete summary tells that how many per diem rates could be deleted from given per diem rates, it also
    returns per diem rates that could be deleted.
  operationId: per_diem_rates_delete_summary_bulk_post
  requestBody:
    required: True
    content:
      application/json:
        schema:
          type: object
          additionalProperties: False
          required:
            - data
          properties:
            data:
              type: array
              items:
                $ref: '../../components/schemas/per_diem_rate.yaml#/per_diem_rate_in_only_id'
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/per_diem_rate.yaml#/per_diem_rate_delete_summary_out'
    '401':
      description: Unauthorised request
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/401.yaml"
    '403':
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/403.yaml"

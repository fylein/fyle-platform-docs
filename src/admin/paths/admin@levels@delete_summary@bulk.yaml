post:
  tags:
    - Levels
  security:
    - oauth2: ['*']
  summary: Get levels delete summary
  description: |
    Returns levels that can be deleted from the supplied IDs. Levels assigned to employees or
    used in expense policies are excluded. A maximum of 200 unique level IDs can be processed.
    Repeated IDs are deduplicated in first-seen order before the limit is enforced.
  operationId: levels_delete_summary_bulk_post
  requestBody:
    required: True
    content:
      application/json:
        schema:
          type: object
          additionalProperties: False
          required:
            - data
          properties:
            data:
              type: array
              items:
                $ref: '../../components/schemas/level.yaml#/level_in_only_id'
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/level.yaml#/level_delete_summary_out'
    '400':
      description: Bad request
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: Cannot perform action for more than 200 levels at once.
              data:
                type: object
                nullable: true
                example: null
              error:
                type: string
                example: InvalidUsage
    '401':
      description: Unauthorised request
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/401.yaml'
    '403':
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/403.yaml'

post:
  tags:
    - Departments
  security:
    - oauth2: ['*']
  summary: Create delete summary for departments
  description: |
    Returns how many of the supplied departments can be deleted and lists those departments.
    Departments assigned to employees or used by budgets, expense policies, or expense rules
    are excluded. A maximum of 200 unique department IDs can be processed. Repeated IDs are
    deduplicated in first-seen order before the limit is enforced.
  operationId: departments_delete_summary_bulk_post
  requestBody:
    required: True
    content:
      application/json:
        schema:
          type: object
          additionalProperties: False
          required:
            - data
          properties:
            data:
              type: array
              items:
                $ref: '../../components/schemas/department.yaml#/department_in_only_id'
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/department.yaml#/department_delete_summary_out'
    '400':
      description: Bad request
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: Cannot perform action for more than 200 departments at once.
              data:
                type: object
                nullable: true
                example: null
              error:
                type: string
                example: InvalidUsage
    '401':
      description: Unauthorised request
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/401.yaml'
    '403':
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/403.yaml'

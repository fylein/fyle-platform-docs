post:
  tags:
    - Reconciliation
  summary: Create transactions export
  description: |
    Create an export request for reconciliation transactions. The export is processed asynchronously.
    When ready, the specified notify_emails will receive the export file. Use query_params to filter
    the transactions (e.g. reconciliation_entry_id=eq.<entry_id>).
  operationId: reconciliation_transactions_exports_post
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          additionalProperties: false
          required:
            - data
          properties:
            data:
              $ref: '../../components/schemas/reconciliation_exports.yaml#/reconciliation_export_in'
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            type: object
            additionalProperties: false
            properties:
              data:
                $ref: '../../components/schemas/reconciliation_exports.yaml#/reconciliation_export_out'
    '400':
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/400.yaml'
    '401':
      description: Unauthorized request
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/401.yaml'
    '403':
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/403.yaml'
    '404':
      description: Not Found
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/404.yaml'

post:
  operationId: mileage_rates_bulk_post
  tags:
    - Mileage Rates
  security:
    - oauth2: ['*']
  summary: Create or update mileage rates in bulk
  description: |
    Create or update mileage rates in bulk. The response is an empty object; re-fetch
    `GET /admin/mileage_rates` after a successful request when the saved rows are needed.
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          additionalProperties: False
          required:
            - data
          properties:
            data:
              type: array
              items:
                $ref: ../../components/schemas/mileage_rate.yaml#/mileage_rate_in
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            type: object
            additionalProperties: False
    '400':
      description: Bad request
      content:
        application/json:
          schema:
            oneOf:
              - $ref: ../../components/schemas/bulk_error.yaml
              - type: object
                properties:
                  error:
                    type: string
                    nullable: true
                  message:
                    type: string
                    nullable: true
                  data:
                    type: object
                    nullable: true
    '401':
      description: Unauthorised request
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/401.yaml
    '403':
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/403.yaml

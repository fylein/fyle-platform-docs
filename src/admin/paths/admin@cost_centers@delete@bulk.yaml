post:
  tags:
    - Cost Centers
  summary: Deletes cost centers
  description: |
    Deletes unused cost centers. If any of the cost center in input is used in other resources then validation error is raised.
  operationId: cost_centers_delete_bulk_post
  requestBody:
    required: True
    content:
      application/json:
        schema:
          type: object
          additionalProperties: False
          required:
            - data
          properties:
            data:
              type: array
              items: 
                $ref: '../../components/schemas/cost_center.yaml#/cost_center_in_only_id'
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            type: object
    '401':
      description: Unauthorised request
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/401.yaml"
    '403':
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/403.yaml"
    '400':
      description: Bad request
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                nullable: true
                example: |
                  Can not delete cost center(s) used in other resources like expense, expense policy, expense rules, budgets, dependent fields.
              data:
                type: object
                example: null
              error:
                type: string
                example: InvalidUsage

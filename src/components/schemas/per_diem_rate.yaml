per_diem_rate_out:
  type: object
  additionalProperties: False
  properties:
    id:
      $ref: './fields.yaml#/id_integer'
    org_id:
      $ref: ./fields.yaml#/org_id
    created_at:
      $ref: ./fields.yaml#/created_at
    updated_at:
      $ref: ./fields.yaml#/updated_at
    is_enabled:
      $ref: ./fields.yaml#/is_enabled
    name:
      allOf:
        - $ref: ./fields.yaml#/name
      example: Florida Rate
    code:
      $ref: ./fields.yaml#/code
    description:
      $ref: ./fields.yaml#/description
    currency:
      type: string
      maxLength: 3
      example: USD
      description: Currency code (must be three letters only)
    rate:
      type: number
      example: 10.0
      description: Amount per night


per_diem_rate_out_embed:
  type: object
  nullable: true
  additionalProperties: False
  properties:
    id:
      $ref: './fields.yaml#/id_integer'
    name:
      allOf:
        - $ref: ./fields.yaml#/name
      example: Florida Rate
    code:
      $ref: ./fields.yaml#/code


per_diem_rate_in:
  type: object
  additionalProperties: False
  required: [ "is_enabled", "name", "currency", "rate" ]
  properties:
    id:
      $ref: './fields.yaml#/id_integer'
    is_enabled:
      $ref: ./fields.yaml#/is_enabled
    name:
      allOf:
        - $ref: ./fields.yaml#/name
      example: Florida Rate
    code:
      $ref: ./fields.yaml#/code
    description:
      $ref: ./fields.yaml#/description
    currency:
      type: string
      maxLength: 3
      example: USD
      description: Currency code (must be three letters only)
    rate:
      type: number
      example: 10.0
      description: Amount per night


per_diem_rate_in_only_id:
  type: object
  required:
    - id
  additionalProperties: False
  properties:
    id:
      $ref: './fields.yaml#/id_integer'


per_diem_rate_delete_summary_out:
  type: object
  additionalProperties: False
  properties:
    data:
      type: object
      properties:
        delete_count:
          type: integer
          description: Count of per diem rates that could be deleted from input per diem rates.
          example: 2
        per_diem_rates:
          type: array
          description: Per diem rates that could be deleted.
          example:
            - id: 1234
            - id: 4567
          items:
            $ref: './per_diem_rate.yaml#/per_diem_rate_in_only_id'

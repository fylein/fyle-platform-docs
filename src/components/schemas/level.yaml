level_out:
  type: object
  additionalProperties: False
  properties:
    id:
      $ref: './fields.yaml#/id_string'
    org_id:
      $ref: ./fields.yaml#/org_id
    created_at:
      $ref: ./fields.yaml#/created_at
    updated_at:
      $ref: ./fields.yaml#/updated_at
    name:
      type: string
      description: |
        Level name of the employees
      example: Associate I
    band:
      type: string
      nullable: True
      description: >
        Band in which this level belongs to, you can group multiple levels into a
        single band.
      example: Associate
    code:
      $ref: ./fields.yaml#/code
    description:
      type: string
      nullable: True
      description: |
        Description of the level
      example: Entry level position
    is_enabled:
      $ref: ./fields.yaml#/is_enabled
  required:
    - id
    - org_id
    - created_at
    - updated_at
    - name
    - band
    - code
    - description
    - is_enabled

level_out_embed:
  type: object
  additionalProperties: False
  nullable: true
  properties:
    id:
      $ref: './fields.yaml#/id_string'
    name:
      type: string
      description: |
        Level name of the employees
      example: Associate I
    band:
      type: string
      nullable: True
      description: >
        Band in which this level belongs to, you can group multiple levels into a
        single band.
      example: Associate
  required:
    - id
    - name
    - band

level_in:
  type: object
  properties:
    id:
      $ref: './fields.yaml#/id_string'
    name:
      type: string
      description: |
        Level name of the employees
      example: Associate I
    band:
      type: string
      nullable: True
      description: >
        Band in which this level belongs to, you can group multiple levels into a
        single band.
      example: Associate
    code:
      $ref: ./fields.yaml#/code
    description:
      type: string
      nullable: True
      description: |
        Description of the level
      example: Entry level position
    is_enabled:
      $ref: ./fields.yaml#/is_enabled
  required:
    - name
    - is_enabled


level_in_only_id:
  type: object
  required:
    - id
  additionalProperties: False
  properties:
    id:
      $ref: './fields.yaml#/id_string'


level_delete_summary_out:
  type: object
  additionalProperties: False
  properties:
    data:
      type: object
      additionalProperties: False
      properties:
        delete_count:
          type: integer
          description: Count of levels that can be deleted from the supplied levels.
          example: 2
        levels:
          type: array
          description: Levels that can be deleted.
          example:
            - id: lvlTqSvgYSlMk
            - id: lvlISw67iupk3
          items:
            $ref: './level.yaml#/level_in_only_id'

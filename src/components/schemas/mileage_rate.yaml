mileage_rate_out:
  type: object
  additionalProperties: false
  properties:
    id:
      $ref: './fields.yaml#/id_integer'
    org_id:
      $ref: ./fields.yaml#/org_id
    created_at:
      $ref: ./fields.yaml#/created_at
    updated_at:
      $ref: ./fields.yaml#/updated_at
    #    start_at:
    #      $ref: ./fields.yaml#/timestamptz_utc
    #    end_at:
    #      $ref: ./fields.yaml#/timestamptz_utc
    unit:
      type: string
      enum:
        - KM
        - MILES
    vehicle_type:
      type: string
      example: 'Audi'
    rate:
      type: number
      example: 10.0
      nullable: true
      description: Amount (in Home currency) per unit.
    slab_rates:
      type: array
      items:
        type: object
        properties:
          rate:
            type: number
            nullable: true
          limit:
            type: number
            nullable: true
    is_enabled:
      $ref: ./fields.yaml#/is_enabled
    code:
      $ref: ./fields.yaml#/code
    vehicle_ownership:
      type: string
      nullable: true
      enum:
        - PERSONAL
        - COMPANY
        - null
      description: Vehicle ownership for advanced mileage rates. `null` for basic mileage rates.
    vehicle_category:
      type: string
      nullable: true
      enum:
        - CAR
        - MOTORCYCLE
        - BICYCLE
        - null
      description: Vehicle category for advanced mileage rates. `null` for basic mileage rates.
    fuel_type:
      type: string
      nullable: true
      enum:
        - PETROL
        - DIESEL
        - LPG
        - ELECTRIC
        - null
      description: Fuel type for advanced car mileage rates. `null` otherwise.
    engine_capacity:
      type: object
      nullable: true
      additionalProperties: false
      description: Engine capacity band for petrol, diesel, and LPG advanced car rates. An empty object for basic mileage rates.
      properties:
        from:
          type: string
          nullable: true
          example: '0'
        to:
          type: string
          nullable: true
          example: '1400'
        unit:
          type: string
          example: cc
    charging_location:
      type: string
      nullable: true
      enum:
        - HOME
        - PUBLIC
        - null
      description: Charging location for advanced electric car mileage rates. `null` otherwise.

mileage_rate_out_embed:
  type: object
  nullable: true
  additionalProperties: False
  properties:
    id:
      $ref: './fields.yaml#/id_integer'
    vehicle_type:
      type: string
      example: 'Audi'
    code:
      $ref: ./fields.yaml#/code

mileage_rate_out_embed_for_expense:
  type: object
  nullable: true
  additionalProperties: False
  properties:
    id:
      $ref: './fields.yaml#/id_integer'
    vehicle_type:
      type: string
      example: 'Audi'
    code:
      $ref: ./fields.yaml#/code
    rate:
      type: number
      example: 10.0
      nullable: true
      description: Amount (in Home currency) per unit.

mileage_rate_in:
  type: object
  required:
    - unit
    - rate
    - vehicle_type
    - is_enabled
    - vehicle_ownership
    - vehicle_category
    - fuel_type
    - engine_capacity
    - charging_location
  properties:
    id:
      $ref: './fields.yaml#/id_integer'
    #    start_at:
    #      $ref: ./fields.yaml#/timestamptz_pst
    #    end_at:
    #      $ref: ./fields.yaml#/timestamptz_pst
    unit:
      type: string
      enum:
        - KM
        - MILES
    vehicle_type:
      type: string
      example: 'Audi'
    rate:
      type: number
      example: 10.0
      nullable: true
      description: Amount (in Home currency) per unit.
    slab_rates:
      type: array
      items:
        type: object
        required:
          - rate
          - limit
        properties:
          rate:
            type: number
            nullable: true
          limit:
            type: number
            nullable: true
    is_enabled:
      $ref: ./fields.yaml#/is_enabled
    code:
      $ref: ./fields.yaml#/code
    vehicle_ownership:
      type: string
      nullable: true
      enum:
        - PERSONAL
        - COMPANY
        - null
      description: Required in every request. Use `null` for a basic mileage rate; an advanced rate requires a non-null value.
    vehicle_category:
      type: string
      nullable: true
      enum:
        - CAR
        - MOTORCYCLE
        - BICYCLE
        - null
      description: Required in every request. Use `null` for a basic mileage rate; an advanced rate requires a non-null value.
    fuel_type:
      type: string
      nullable: true
      enum:
        - PETROL
        - DIESEL
        - LPG
        - ELECTRIC
        - null
      description: Required in every request. Use `null` for motorcycles, bicycles, and basic mileage rates.
    engine_capacity:
      type: object
      nullable: true
      additionalProperties: false
      description: Required in every request. Use an empty object for electric and basic mileage rates.
      properties:
        from:
          type: string
          nullable: true
          example: '0'
        to:
          type: string
          nullable: true
          example: '1400'
        unit:
          type: string
          example: cc
    charging_location:
      type: string
      nullable: true
      enum:
        - HOME
        - PUBLIC
        - null
      description: Required in every request. Use `null` unless the rate is an advanced electric car.

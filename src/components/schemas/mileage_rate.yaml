mileage_rate_out:
  type: object
  additionalProperties: false
  properties:
    id:
      $ref: './fields.yaml#/id_integer'
    org_id:
      $ref: ./fields.yaml#/org_id
    created_at:
      $ref: ./fields.yaml#/created_at
    updated_at:
      $ref: ./fields.yaml#/updated_at
    #    start_at:
    #      $ref: ./fields.yaml#/timestamptz_utc
    #    end_at:
    #      $ref: ./fields.yaml#/timestamptz_utc
    unit:
      type: string
      enum:
        - KM
        - MILES
    vehicle_type:
      type: string
      example: 'Audi'
    rate:
      type: number
      example: 10.0
      nullable: true
      description: Amount (in Home currency) per unit.
    slab_rates:
      type: array
      items:
        type: object
        properties:
          rate:
            type: number
            nullable: true
          limit:
            type: number
            nullable: true
    is_enabled:
      $ref: ./fields.yaml#/is_enabled
    code:
      $ref: ./fields.yaml#/code

mileage_rate_out_embed:
  type: object
  nullable: true
  additionalProperties: False
  properties:
    id:
      $ref: './fields.yaml#/id_integer'
    vehicle_type:
      type: string
      example: 'Audi'
    code:
      $ref: ./fields.yaml#/code

mileage_rate_out_embed_for_expense:
  type: object
  nullable: true
  additionalProperties: False
  properties:
    id:
      $ref: './fields.yaml#/id_integer'
    vehicle_type:
      type: string
      example: 'Audi'
    code:
      $ref: ./fields.yaml#/code
    rate:
      type: number
      example: 10.0
      nullable: true
      description: Amount (in Home currency) per unit.

mileage_rate_in:
  type: object
  required:
    - unit
    - rate
    - vehicle_type
    - is_enabled
  properties:
    id:
      $ref: './fields.yaml#/id_integer'
    #    start_at:
    #      $ref: ./fields.yaml#/timestamptz_pst
    #    end_at:
    #      $ref: ./fields.yaml#/timestamptz_pst
    unit:
      type: string
      enum:
        - KM
        - MILES
    vehicle_type:
      type: string
      example: 'Audi'
    rate:
      type: number
      example: 10.0
      minimum: 0
      exclusiveMinimum: true
      description: Amount (in Home currency) per unit.
    slab_rates:
      type: array
      maxItems: 1
      items:
        type: object
        required:
          - rate
          - limit
        properties:
          rate:
            type: number
          limit:
            type: number
    is_enabled:
      $ref: ./fields.yaml#/is_enabled
    code:
      $ref: ./fields.yaml#/code

mileage_rate_in_only_id:
  type: object
  required:
    - id
  additionalProperties: False
  properties:
    id:
      $ref: './fields.yaml#/id_integer'

mileage_rate_delete_summary_out:
  type: object
  additionalProperties: False
  properties:
    data:
      type: object
      properties:
        delete_count:
          type: integer
          description: Count of mileage rates that could be deleted from input mileage rates.
          example: 2
        mileage_rates:
          type: array
          description: Mileage rates that could be deleted.
          example:
            - id: 9080
            - id: 9081
          items:
            $ref: './mileage_rate.yaml#/mileage_rate_in_only_id'

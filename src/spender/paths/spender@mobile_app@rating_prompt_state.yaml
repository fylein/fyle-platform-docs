get:
  tags:
    - Mobile app
  summary: Get mobile app rating prompt state for the current user
  operationId: mobile_app_rating_prompt_state_get
  description: |
    Returns persisted timestamps for in-app rating pre-prompt cooldowns. Scoped by `user_id`; the same state applies across orgs and devices.
    The client should apply business rules (e.g. skip pre-prompt if `last_native_review_prompt_at` is within 180 days or
    `last_rating_pre_prompt_dismiss_at` is within 60 days) in addition to other eligibility checks.
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            type: object
            additionalProperties: false
            required:
              - data
            properties:
              data:
                $ref: '../components/schemas/rating_prompt_state.yaml#/rating_prompt_state_out'
    '400':
      description: Bad request
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/400.yaml
    '401':
      description: Unauthorized request
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/401.yaml'
    '403':
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/403.yaml'

post:
  tags:
    - Mobile app
  summary: Update mobile app rating prompt state for the current user
  operationId: mobile_app_rating_prompt_state_post
  description: |
    Records either a pre-prompt dismiss (`is_pre_prompt_dismissed: true`, native prompt not shown) or that the native
    rating prompt was shown (`false`), using server UTC time. The stored timestamp for the affected field is the greater
    of the existing value and the current server time (GREATEST semantics). `created_at` is set only on first insert.
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          additionalProperties: false
          required:
            - data
          properties:
            data:
              $ref: '../components/schemas/rating_prompt_state.yaml#/rating_prompt_state_in'
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            type: object
            additionalProperties: false
            required:
              - data
            properties:
              data:
                $ref: '../components/schemas/rating_prompt_state.yaml#/rating_prompt_state_out'
    '400':
      description: Bad request
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/400.yaml
    '401':
      description: Unauthorized request
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/401.yaml'
    '403':
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/403.yaml'

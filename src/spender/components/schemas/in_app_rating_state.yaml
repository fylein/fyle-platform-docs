in_app_rating_state_out:
  type: object
  additionalProperties: false
  properties:
    last_native_review_prompt_at:
      type: string
      format: date-time
      nullable: true
      description: |
        When the client last invoked the OS in-app review API after the user accepted the pre-prompt.
        Used for cooldown (e.g. do not pre-prompt again within 180 days).
    last_rating_pre_prompt_dismiss_at:
      type: string
      format: date-time
      nullable: true
      description: |
        When the user last dismissed the pre-prompt. Used for cooldown (e.g. 60 days).
    updated_at:
      type: string
      format: date-time
      nullable: true
      description: |
        Server time of the last persisted update. Null when no row exists yet for the user.

in_app_rating_state_in:
  type: object
  additionalProperties: false
  properties:
    last_native_review_prompt_at:
      type: string
      format: date-time
      nullable: true
      description: Timestamp for a native review prompt event; merged with existing using GREATEST semantics.
    last_rating_pre_prompt_dismiss_at:
      type: string
      format: date-time
      nullable: true
      description: Timestamp for a pre-prompt dismiss event; merged with existing using GREATEST semantics.

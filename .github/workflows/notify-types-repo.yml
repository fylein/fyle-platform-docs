name: Notify types repo on spec change

# Fires after the bundler commits regenerated specs to reference/.
# The bundler commits via a PAT, so its push re-triggers this workflow,
# and the reference/** path filter ensures we only notify on real changes.
on:
  push:
    branches:
      - main
    paths:
      - 'reference/**'

permissions:
  contents: read

jobs:
  notify:
    name: Dispatch to fyle-platform-types
    runs-on: ubuntu-latest
    steps:
      - name: Generate token for fyle-platform-types
        id: types-app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_TYPES_DISPATCH_APP_ID }}
          private-key: ${{ secrets.GH_TYPES_DISPATCH_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: fyle-platform-types

      - name: Notify fyle-platform-types of spec change
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ steps.types-app-token.outputs.token }}
          repository: ${{ github.repository_owner }}/fyle-platform-types
          event-type: specs-updated
          client-payload: '{"sha": "${{ github.sha }}", "ref": "${{ github.ref }}"}'
